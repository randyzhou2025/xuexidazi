# 生产部署（单容器：主站 + API + padmin）
# 方案 B：加入各项目 Docker 网络，直连 Postgres 容器（无需映射宿主机端口）
#
# 使用：
#   cp .env.prod.example .env.prod
#   # 确认网络名（与下方默认不一致时写入 .env.prod）：
#   #   docker inspect exam_postgres --format '{{range $k,$v := .NetworkSettings.Networks}}{{$k}}{{"\n"}}{{end}}'
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build

services:
  xuexidazi:
    build:
      context: .
      dockerfile: Dockerfile
    image: xuexidazi:latest
    container_name: xuexidazi
    restart: unless-stopped
    networks:
      - exam_net
      - ptoe_net
      - gotit_net
    environment:
      PORT: "8090"
      HOST: 0.0.0.0
      XUEXIDAZI_DATABASE_URL: ${XUEXIDAZI_DATABASE_URL:?set XUEXIDAZI_DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET min 16 chars}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      PTOE_DATABASE_URL: ${PTOE_DATABASE_URL:-}
      PTOE_SESSION_SECRET: ${PTOE_SESSION_SECRET:-}
      PTOE_IDLE_RELEASE_DAYS: ${PTOE_IDLE_RELEASE_DAYS:-30}
      PTOE_MAX_DEVICES_DEFAULT: ${PTOE_MAX_DEVICES_DEFAULT:-2}
      GOTIT_DATABASE_URL: ${GOTIT_DATABASE_URL:-}
    ports:
      - "${XUEXIDAZI_BIND:-127.0.0.1:8090}:8090"

networks:
  exam_net:
    external: true
    name: ${EXAM_DOCKER_NETWORK:-exammaster_default}
  ptoe_net:
    external: true
    name: ${PTOE_DOCKER_NETWORK:-periodictable_default}
  gotit_net:
    external: true
    name: ${GOTIT_DOCKER_NETWORK:-gotit_default}
